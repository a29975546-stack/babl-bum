<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#130633" />
  <meta name="description" content="Гекса Сорт 3D — расслабляющая HTML5 головоломка с сортировкой цветных шестигранных стеков." />
  <title>Гекса Сорт 3D</title>
  <script src="https://yandex.ru/games/sdk/v2"></script>
  <style>
    :root {
      --bg0: #070015;
      --bg1: #17033f;
      --violet: #8b5cff;
      --violet2: #d3a7ff;
      --panel: rgba(28, 15, 63, .76);
      --panel2: rgba(11, 6, 32, .88);
      --text: #fff8ff;
      --muted: #bdaee8;
      --gold: #ffd166;
      --green: #55f079;
      --pink: #ff4f88;
      font-family: Inter, ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #080018; color: var(--text); }
    body {
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 16% 18%, rgba(123, 68, 255, .55), transparent 32%),
        radial-gradient(circle at 84% 28%, rgba(98, 225, 255, .18), transparent 28%),
        radial-gradient(circle at 50% 108%, rgba(255, 82, 168, .22), transparent 36%),
        linear-gradient(145deg, #10032f 0%, #160546 44%, #050014 100%);
    }

    .game {
      width: min(100vw, 560px);
      height: min(100vh, 920px);
      min-height: 640px;
      position: relative;
      overflow: hidden;
      padding: max(12px, env(safe-area-inset-top)) 14px max(12px, env(safe-area-inset-bottom));
      isolation: isolate;
    }

    .aurora,
    .aurora::before,
    .aurora::after {
      content: "";
      position: absolute;
      inset: auto;
      border-radius: 999px;
      filter: blur(28px);
      opacity: .75;
      pointer-events: none;
      z-index: -1;
    }
    .aurora { width: 260px; height: 260px; left: -90px; top: 80px; background: rgba(118, 55, 255, .7); }
    .aurora::before { width: 260px; height: 210px; right: -470px; top: 190px; background: rgba(255, 70, 158, .28); }
    .aurora::after { width: 360px; height: 210px; left: 190px; bottom: -520px; background: rgba(93, 244, 154, .22); }

    .topbar {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }
    .hud-card, .order-card, .tool-card, .tray, .board-shell {
      border: 1px solid rgba(210, 178, 255, .18);
      background: linear-gradient(180deg, rgba(60, 34, 122, .72), rgba(17, 8, 48, .82));
      box-shadow: 0 18px 48px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.13);
      backdrop-filter: blur(10px);
    }
    .hud-card {
      min-height: 66px;
      border-radius: 20px;
      padding: 10px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
      position: relative;
      overflow: hidden;
    }
    .hud-card::after {
      content: "";
      position: absolute;
      inset: -50% auto auto -30%;
      width: 100px;
      height: 160px;
      transform: rotate(26deg);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
    }
    .label { color: var(--muted); font-size: 11px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }
    .value { font-size: 21px; font-weight: 950; line-height: 1; text-shadow: 0 3px 18px rgba(190, 132, 255, .35); }
    .value.small { font-size: 18px; color: var(--gold); }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 4px 2px 10px;
      gap: 12px;
    }
    h1 {
      margin: 0;
      font-size: clamp(25px, 7vw, 42px);
      letter-spacing: -0.05em;
      line-height: .95;
      text-shadow: 0 4px 0 rgba(40,10,92,.92), 0 0 32px rgba(149, 93, 255, .75);
    }
    .pill {
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.08);
      color: #fff;
      border-radius: 999px;
      padding: 9px 12px;
      font-weight: 900;
      font-size: 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12);
      white-space: nowrap;
    }

    .order-card {
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 10px;
      align-items: center;
      border-radius: 22px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }
    .order-gem {
      width: 58px;
      height: 58px;
      position: relative;
      filter: drop-shadow(0 12px 18px rgba(0,0,0,.38));
    }
    .order-gem .hex-face {
      width: 100%; height: 100%;
      clip-path: polygon(25% 5%, 75% 5%, 100% 50%, 75% 95%, 25% 95%, 0 50%);
      background: var(--goalColor, linear-gradient(135deg, #64ff8e, #19b94a));
      border: 2px solid rgba(255,255,255,.7);
      box-shadow: inset 0 8px 12px rgba(255,255,255,.38), inset 0 -14px 18px rgba(0,0,0,.24), 0 0 28px rgba(255,255,255,.14);
    }
    .order-text strong { display: block; font-size: 17px; line-height: 1; margin-bottom: 6px; }
    .progress {
      height: 13px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(5, 0, 20, .62);
      border: 1px solid rgba(255,255,255,.1);
      box-shadow: inset 0 2px 8px rgba(0,0,0,.5);
    }
    .progress > i {
      display: block;
      width: 0%; height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #fff, var(--goalSolid, #60f783));
      box-shadow: 0 0 16px var(--goalSolid, #60f783);
      transition: width .25s ease;
    }
    .hint { color: var(--muted); font-size: 12px; margin-top: 4px; }

    .board-shell {
      height: min(54vh, 490px);
      min-height: 375px;
      border-radius: 34px;
      padding: 14px;
      position: relative;
      overflow: hidden;
      transform: translateZ(0);
    }
    .board-shell::before {
      content: "";
      position: absolute;
      inset: 7px;
      border-radius: 28px;
      background: radial-gradient(circle at 50% 20%, rgba(153, 118, 255, .24), transparent 36%), linear-gradient(180deg, rgba(51, 32, 111, .66), rgba(7, 2, 25, .78));
      box-shadow: inset 0 2px 0 rgba(255,255,255,.12), inset 0 -15px 35px rgba(0,0,0,.33), 0 0 0 1px rgba(255,255,255,.08);
      pointer-events: none;
    }
    .board {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 1;
      perspective: 900px;
      transform-style: preserve-3d;
    }

    .cell {
      position: absolute;
      width: var(--hexW, 74px);
      height: var(--hexH, 64px);
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform .16s ease, filter .16s ease;
    }
    .cell::before,
    .cell::after {
      content: "";
      position: absolute;
      inset: 0;
      clip-path: polygon(25% 4%, 75% 4%, 100% 50%, 75% 96%, 25% 96%, 0 50%);
    }
    .cell::before {
      background: linear-gradient(155deg, rgba(209, 177, 255, .42), rgba(59, 36, 118, .32) 40%, rgba(4, 0, 18, .76));
      filter: drop-shadow(0 10px 12px rgba(0,0,0,.48));
    }
    .cell::after {
      inset: 7px;
      background: radial-gradient(circle at 38% 24%, rgba(255,255,255,.12), transparent 30%), linear-gradient(180deg, rgba(28, 19, 65, .9), rgba(3, 0, 14, .94));
      box-shadow: inset 0 9px 14px rgba(255,255,255,.05), inset 0 -12px 18px rgba(0,0,0,.7);
    }
    .cell.target { transform: translate(-50%, -50%) scale(1.08); filter: drop-shadow(0 0 18px rgba(199,154,255,.8)); }
    .cell.invalid { filter: grayscale(.7) brightness(.8); }

    .stack {
      position: absolute;
      left: 50%; top: 50%;
      width: var(--hexW, 74px);
      height: calc(var(--hexH, 64px) + 38px);
      transform: translate(-50%, -62%);
      transform-style: preserve-3d;
      z-index: 5;
      pointer-events: none;
      filter: drop-shadow(0 17px 14px rgba(0,0,0,.55));
    }
    .tile {
      position: absolute;
      left: 0;
      bottom: var(--y, 0px);
      width: var(--hexW, 74px);
      height: var(--hexH, 64px);
      clip-path: polygon(25% 4%, 75% 4%, 100% 50%, 75% 96%, 25% 96%, 0 50%);
      background: var(--c);
      border: 2px solid rgba(255,255,255,.52);
      box-shadow: inset 0 12px 11px rgba(255,255,255,.35), inset 0 -15px 14px rgba(0,0,0,.25), 0 5px 0 var(--dark), 0 0 18px var(--glow);
    }
    .tile::before {
      content: "";
      position: absolute;
      left: 16%; top: 8%;
      width: 42%; height: 28%;
      border-radius: 999px;
      background: rgba(255,255,255,.55);
      filter: blur(9px);
      transform: rotate(-18deg);
    }

    .combo-float, .particle {
      position: absolute;
      z-index: 50;
      pointer-events: none;
      font-weight: 950;
      text-shadow: 0 2px 12px rgba(0,0,0,.7);
    }
    .combo-float { font-size: 26px; animation: floatUp .78s ease forwards; }
    @keyframes floatUp { to { transform: translateY(-70px) scale(1.15); opacity: 0; } }
    .particle {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--p);
      box-shadow: 0 0 16px var(--p);
      animation: popParticle .66s ease-out forwards;
    }
    @keyframes popParticle { to { transform: translate(var(--dx), var(--dy)) scale(.2); opacity: 0; } }

    .tool-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin: 12px 0 10px;
    }
    .tool-card {
      border-radius: 18px;
      min-height: 58px;
      display: grid;
      place-items: center;
      padding: 6px;
      cursor: pointer;
      position: relative;
      transition: transform .14s ease, filter .14s ease;
    }
    .tool-card:active { transform: translateY(2px) scale(.98); }
    .tool-card.active { outline: 2px solid rgba(255,255,255,.88); filter: drop-shadow(0 0 18px rgba(255,255,255,.3)); }
    .tool-icon { font-size: 22px; line-height: 1; }
    .tool-name { font-size: 10px; color: var(--muted); font-weight: 800; margin-top: 3px; }
    .badge {
      position: absolute;
      right: 6px; top: 5px;
      min-width: 20px;
      height: 20px;
      border-radius: 999px;
      padding: 0 6px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #ffe48a, #ff9f1c);
      color: #291100;
      font-size: 12px;
      font-weight: 950;
      box-shadow: 0 4px 10px rgba(0,0,0,.35);
    }

    .tray {
      height: 136px;
      border-radius: 28px;
      padding: 13px 13px 11px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      position: relative;
    }
    .piece {
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.12);
      position: relative;
      cursor: grab;
      overflow: hidden;
      display: grid;
      place-items: center;
      min-width: 0;
    }
    .piece.selected { outline: 2px solid rgba(255,255,255,.84); box-shadow: 0 0 26px rgba(168,122,255,.5); }
    .piece .stack { --hexW: 68px; --hexH: 59px; top: 56%; transform: translate(-50%, -58%) scale(.92); }
    .piece.empty { opacity: .35; cursor: default; }
    .piece::after {
      content: "";
      position: absolute;
      inset: -60% auto auto -50%;
      width: 80px; height: 210px;
      transform: rotate(22deg);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.09), transparent);
    }
    .drag-ghost {
      position: fixed;
      left: 0; top: 0;
      width: 84px;
      height: 100px;
      z-index: 999;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(1.08);
      filter: drop-shadow(0 25px 22px rgba(0,0,0,.6));
    }
    .drag-ghost .stack { --hexW: 84px; --hexH: 73px; }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 1000;
      display: none;
      place-items: center;
      background: rgba(4, 0, 16, .68);
      backdrop-filter: blur(10px);
      padding: 20px;
    }
    .overlay.show { display: grid; }
    .modal {
      width: min(420px, 92vw);
      border-radius: 32px;
      border: 1px solid rgba(255,255,255,.18);
      background: linear-gradient(180deg, rgba(64,35,132,.96), rgba(15,5,46,.96));
      box-shadow: 0 28px 80px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.18);
      padding: 25px;
      text-align: center;
    }
    .modal h2 { margin: 0 0 8px; font-size: 34px; letter-spacing: -.04em; }
    .modal p { margin: 0 0 18px; color: var(--muted); line-height: 1.45; }
    .btn {
      appearance: none;
      border: 0;
      border-radius: 20px;
      padding: 14px 18px;
      width: 100%;
      background: linear-gradient(180deg, #fff, #d8c2ff);
      color: #1b0645;
      font-weight: 950;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 9px 0 #7b4ee2, 0 18px 28px rgba(0,0,0,.32);
    }
    .btn:active { transform: translateY(5px); box-shadow: 0 4px 0 #7b4ee2, 0 10px 18px rgba(0,0,0,.32); }

    .toast {
      position: absolute;
      left: 50%; top: 50%;
      z-index: 1200;
      transform: translate(-50%, -50%);
      max-width: 86%;
      padding: 12px 16px;
      border-radius: 18px;
      background: rgba(9, 2, 30, .88);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 15px 40px rgba(0,0,0,.4);
      color: #fff;
      font-weight: 900;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }
    .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1.02); }

    @media (max-height: 720px) {
      .game { min-height: 0; height: 100vh; }
      .title-row { margin-bottom: 7px; }
      .hud-card { min-height: 56px; padding: 8px; }
      .value { font-size: 18px; }
      .order-card { margin-bottom: 8px; padding: 8px 10px; }
      .board-shell { height: 46vh; min-height: 320px; }
      .tool-row { margin: 8px 0; }
      .tray { height: 118px; }
      .piece .stack { transform: translate(-50%, -57%) scale(.82); }
    }
  </style>
</head>
<body>
  <main class="game" id="game">
    <div class="aurora"></div>
    <section class="topbar" aria-label="Игровая статистика">
      <div class="hud-card"><span class="label">Счёт</span><span class="value" id="score">0</span></div>
      <div class="hud-card"><span class="label">Лучший</span><span class="value" id="best">0</span></div>
      <div class="hud-card"><span class="label">Монеты</span><span class="value small" id="coins">0</span></div>
    </section>

    <div class="title-row">
      <h1>Гекса<br>Сорт 3D</h1>
      <div class="pill" id="comboPill">Комбо ×1</div>
    </div>

    <section class="order-card" id="orderCard">
      <div class="order-gem"><div class="hex-face"></div></div>
      <div class="order-text">
        <strong id="orderTitle">Заказ цвета</strong>
        <div class="progress"><i id="orderBar"></i></div>
        <div class="hint" id="orderHint">Собери цветные верхушки в группы 3+</div>
      </div>
    </section>

    <section class="board-shell">
      <div class="board" id="board" aria-label="Игровое поле"></div>
    </section>

    <section class="tool-row">
      <button class="tool-card" id="toolHammer" type="button"><span class="badge" id="hammerCount">2</span><span class="tool-icon">🔨</span><span class="tool-name">Убрать</span></button>
      <button class="tool-card" id="toolBomb" type="button"><span class="badge" id="bombCount">1</span><span class="tool-icon">💥</span><span class="tool-name">Бомба</span></button>
      <button class="tool-card" id="toolShuffle" type="button"><span class="badge" id="shuffleCount">2</span><span class="tool-icon">🔄</span><span class="tool-name">Реролл</span></button>
      <button class="tool-card" id="toolAd" type="button"><span class="tool-icon">🎁</span><span class="tool-name">Бонус</span></button>
    </section>

    <section class="tray" id="tray" aria-label="Доступные стеки"></section>

    <div class="toast" id="toast"></div>
    <section class="overlay" id="overlay">
      <div class="modal">
        <h2>Поле заполнено</h2>
        <p id="gameoverText">Попробуй ещё раз и собери больше цветных комбо.</p>
        <button class="btn" id="restartBtn" type="button">Играть снова</button>
      </div>
    </section>
  </main>

  <script>
  (() => {
    'use strict';

    const COLORS = [
      { id: 'lime', name: 'лайм', solid: '#58f56c', grad: 'linear-gradient(145deg,#b7ffb8 0%,#51f16c 43%,#16a841 100%)', dark: '#0f7c33', glow: 'rgba(88,245,108,.65)' },
      { id: 'pink', name: 'розовый', solid: '#ff4f88', grad: 'linear-gradient(145deg,#ffc5d4 0%,#ff4f88 44%,#b8194e 100%)', dark: '#922048', glow: 'rgba(255,79,136,.65)' },
      { id: 'cyan', name: 'бирюза', solid: '#4ee9ff', grad: 'linear-gradient(145deg,#c8fbff 0%,#4ee9ff 45%,#137ea8 100%)', dark: '#146b88', glow: 'rgba(78,233,255,.62)' },
      { id: 'gold', name: 'золото', solid: '#ffd166', grad: 'linear-gradient(145deg,#fff1b4 0%,#ffd166 44%,#d47718 100%)', dark: '#a75d12', glow: 'rgba(255,209,102,.62)' },
      { id: 'violet', name: 'фиолетовый', solid: '#a66bff', grad: 'linear-gradient(145deg,#ead7ff 0%,#a66bff 44%,#5921bd 100%)', dark: '#4f238f', glow: 'rgba(166,107,255,.66)' },
      { id: 'orange', name: 'апельсин', solid: '#ff7b45', grad: 'linear-gradient(145deg,#ffd0a8 0%,#ff7b45 45%,#b53217 100%)', dark: '#9d301c', glow: 'rgba(255,123,69,.62)' }
    ];

    const els = {
      game: document.getElementById('game'),
      board: document.getElementById('board'),
      tray: document.getElementById('tray'),
      score: document.getElementById('score'),
      best: document.getElementById('best'),
      coins: document.getElementById('coins'),
      comboPill: document.getElementById('comboPill'),
      orderCard: document.getElementById('orderCard'),
      orderTitle: document.getElementById('orderTitle'),
      orderHint: document.getElementById('orderHint'),
      orderBar: document.getElementById('orderBar'),
      overlay: document.getElementById('overlay'),
      gameoverText: document.getElementById('gameoverText'),
      restartBtn: document.getElementById('restartBtn'),
      toast: document.getElementById('toast'),
      hammerBtn: document.getElementById('toolHammer'),
      bombBtn: document.getElementById('toolBomb'),
      shuffleBtn: document.getElementById('toolShuffle'),
      adBtn: document.getElementById('toolAd'),
      hammerCount: document.getElementById('hammerCount'),
      bombCount: document.getElementById('bombCount'),
      shuffleCount: document.getElementById('shuffleCount')
    };

    const rows = [3, 4, 5, 4, 3];
    const state = {
      cells: [],
      pieces: [],
      selectedPiece: null,
      activeTool: null,
      dragging: null,
      score: 0,
      best: Number(localStorage.getItem('hexaSortBest') || 0),
      coins: Number(localStorage.getItem('hexaSortCoins') || 0),
      combo: 1,
      power: { hammer: 2, bomb: 1, shuffle: 2 },
      order: null,
      audio: null,
      ya: null
    };

    function initYandex() {
      if (window.YaGames && typeof YaGames.init === 'function') {
        YaGames.init().then(ysdk => {
          state.ya = ysdk;
          try { ysdk.features.LoadingAPI?.ready(); } catch (e) {}
        }).catch(() => {});
      }
    }

    function makeAudio() {
      if (state.audio) return state.audio;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return null;
      state.audio = new Ctx();
      return state.audio;
    }

    function sound(type = 'tap') {
      const ctx = makeAudio();
      if (!ctx) return;
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const map = { tap: [420, .035], place: [560, .055], pop: [760, .09], bad: [150, .08], win: [960, .12] };
      const [freq, dur] = map[type] || map.tap;
      osc.type = type === 'bad' ? 'sawtooth' : 'sine';
      osc.frequency.setValueAtTime(freq, now);
      osc.frequency.exponentialRampToValueAtTime(type === 'win' ? freq * 1.5 : freq * .72, now + dur);
      gain.gain.setValueAtTime(.0001, now);
      gain.gain.exponentialRampToValueAtTime(.07, now + .01);
      gain.gain.exponentialRampToValueAtTime(.0001, now + dur);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now);
      osc.stop(now + dur + .02);
    }

    function colorById(id) { return COLORS.find(c => c.id === id) || COLORS[0]; }
    function rand(max) { return Math.floor(Math.random() * max); }
    function pickColor(bias) {
      if (bias && Math.random() < .42) return bias;
      return COLORS[rand(COLORS.length)].id;
    }

    function newPiece() {
      const len = 3 + rand(3);
      const bias = COLORS[rand(COLORS.length)].id;
      const stack = [];
      for (let i = 0; i < len; i++) stack.push(pickColor(i > 0 && Math.random() < .55 ? stack[i - 1] : bias));
      return stack;
    }

    function newOrder() {
      const c = COLORS[rand(COLORS.length)];
      state.order = { color: c.id, target: 16 + rand(10), count: 0 };
      renderOrder();
    }

    function renderOrder() {
      const c = colorById(state.order.color);
      els.orderCard.style.setProperty('--goalColor', c.grad);
      els.orderCard.style.setProperty('--goalSolid', c.solid);
      els.orderTitle.textContent = `Заказ: ${c.name}`;
      els.orderHint.textContent = `${state.order.count}/${state.order.target} плиток собрано`;
      els.orderBar.style.width = `${Math.min(100, state.order.count / state.order.target * 100)}%`;
    }

    function buildBoard() {
      state.cells = [];
      els.board.innerHTML = '';
      let id = 0;
      rows.forEach((count, r) => {
        for (let c = 0; c < count; c++) {
          const cell = { id, row: r, col: c, stack: [], el: null, x: 0, y: 0, neigh: [] };
          const el = document.createElement('div');
          el.className = 'cell';
          el.dataset.cell = String(id);
          el.addEventListener('click', () => onCellClick(cell));
          cell.el = el;
          state.cells.push(cell);
          els.board.appendChild(el);
          id++;
        }
      });
      layoutBoard();
      window.addEventListener('resize', layoutBoard);
    }

    function layoutBoard() {
      const rect = els.board.getBoundingClientRect();
      const usableW = Math.max(280, rect.width - 18);
      const usableH = Math.max(300, rect.height - 18);
      const hexW = Math.min(78, Math.max(55, usableW / 5.45));
      const hexH = hexW * .86;
      const stepX = hexW * .88;
      const stepY = hexH * .88;
      const totalH = stepY * (rows.length - 1) + hexH;
      const top = (usableH - totalH) / 2 + hexH * .55 + 4;
      let id = 0;
      rows.forEach((count, r) => {
        const rowW = (count - 1) * stepX + hexW;
        const startX = rect.width / 2 - rowW / 2 + hexW / 2;
        for (let c = 0; c < count; c++) {
          const cell = state.cells[id++];
          cell.x = startX + c * stepX;
          cell.y = top + r * stepY;
          cell.el.style.left = `${cell.x}px`;
          cell.el.style.top = `${cell.y}px`;
          cell.el.style.setProperty('--hexW', `${hexW}px`);
          cell.el.style.setProperty('--hexH', `${hexH}px`);
        }
      });
      computeNeighbors(hexW * 1.05);
      renderBoard();
    }

    function computeNeighbors(limit) {
      state.cells.forEach(c => c.neigh = []);
      for (let i = 0; i < state.cells.length; i++) {
        for (let j = i + 1; j < state.cells.length; j++) {
          const a = state.cells[i], b = state.cells[j];
          const d = Math.hypot(a.x - b.x, a.y - b.y);
          if (d < limit) { a.neigh.push(b.id); b.neigh.push(a.id); }
        }
      }
    }

    function createStack(stack, scaleClass = '') {
      const wrap = document.createElement('div');
      wrap.className = `stack ${scaleClass}`.trim();
      const visible = stack.slice(-8);
      visible.forEach((id, i) => {
        const c = colorById(id);
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.style.setProperty('--y', `${i * 7}px`);
        tile.style.setProperty('--c', c.grad);
        tile.style.setProperty('--dark', c.dark);
        tile.style.setProperty('--glow', c.glow);
        tile.style.zIndex = String(i + 1);
        wrap.appendChild(tile);
      });
      return wrap;
    }

    function renderBoard() {
      state.cells.forEach(cell => {
        cell.el.querySelectorAll('.stack').forEach(n => n.remove());
        cell.el.classList.toggle('invalid', cell.stack.length > 0 && state.selectedPiece !== null);
        if (cell.stack.length) cell.el.appendChild(createStack(cell.stack));
      });
    }

    function renderTray() {
      els.tray.innerHTML = '';
      state.pieces.forEach((piece, index) => {
        const el = document.createElement('div');
        el.className = 'piece';
        el.dataset.piece = String(index);
        if (state.selectedPiece === index) el.classList.add('selected');
        el.appendChild(createStack(piece));
        el.addEventListener('click', () => selectPiece(index));
        el.addEventListener('pointerdown', e => startDrag(e, index));
        els.tray.appendChild(el);
      });
    }

    function renderHud() {
      els.score.textContent = state.score.toLocaleString('ru-RU');
      els.best.textContent = state.best.toLocaleString('ru-RU');
      els.coins.textContent = state.coins.toLocaleString('ru-RU');
      els.comboPill.textContent = `Комбо ×${state.combo}`;
      els.hammerCount.textContent = state.power.hammer;
      els.bombCount.textContent = state.power.bomb;
      els.shuffleCount.textContent = state.power.shuffle;
      localStorage.setItem('hexaSortCoins', String(state.coins));
      localStorage.setItem('hexaSortBest', String(state.best));
    }

    function selectPiece(index) {
      state.activeTool = null;
      updateToolButtons();
      state.selectedPiece = state.selectedPiece === index ? null : index;
      sound('tap');
      renderTray();
      renderBoard();
    }

    function onCellClick(cell) {
      if (state.activeTool) return useToolOnCell(cell);
      if (state.selectedPiece !== null) placePiece(state.selectedPiece, cell);
    }

    function placePiece(pieceIndex, cell) {
      const piece = state.pieces[pieceIndex];
      if (!piece || cell.stack.length) {
        toast(cell.stack.length ? 'Сюда нельзя: слот уже занят' : 'Выбери стек снизу');
        sound('bad');
        return false;
      }
      cell.stack = piece.slice();
      state.pieces[pieceIndex] = newPiece();
      state.selectedPiece = null;
      state.combo = 1;
      sound('place');
      renderTray();
      renderBoard();
      setTimeout(() => resolveCombos(cell), 100);
      return true;
    }

    function topColor(cell) { return cell.stack[cell.stack.length - 1]; }

    function sameTopGroups() {
      const seen = new Set();
      const groups = [];
      state.cells.forEach(start => {
        const color = topColor(start);
        if (!color || seen.has(start.id)) return;
        const group = [];
        const queue = [start.id];
        seen.add(start.id);
        while (queue.length) {
          const id = queue.shift();
          const cell = state.cells[id];
          group.push(cell);
          cell.neigh.forEach(nid => {
            const n = state.cells[nid];
            if (!seen.has(nid) && topColor(n) === color) {
              seen.add(nid);
              queue.push(nid);
            }
          });
        }
        if (group.length >= 3) groups.push({ color, cells: group });
      });
      return groups;
    }

    function resolveCombos(focusCell) {
      const groups = sameTopGroups();
      if (!groups.length) {
        checkGameOver();
        return;
      }
      let delay = 0;
      groups.forEach((group, idx) => {
        setTimeout(() => clearGroup(group, focusCell || group.cells[0], idx), delay);
        delay += 220;
      });
      setTimeout(() => resolveCombos(focusCell), delay + 160);
    }

    function clearGroup(group, focusCell, idx) {
      let removed = 0;
      group.cells.forEach(cell => {
        while (cell.stack.length && topColor(cell) === group.color) {
          cell.stack.pop();
          removed++;
        }
      });
      const c = colorById(group.color);
      state.score += removed * 14 * state.combo;
      state.coins += Math.max(1, Math.floor(removed / 2));
      if (group.color === state.order.color) {
        state.order.count += removed;
        if (state.order.count >= state.order.target) completeOrder();
        else renderOrder();
      }
      state.combo = Math.min(9, state.combo + 1);
      if (state.score > state.best) state.best = state.score;
      showCombo(`+${removed * 14}`, focusCell, c.solid);
      popParticles(group.cells, c.solid);
      sound(idx ? 'win' : 'pop');
      renderHud();
      renderBoard();
    }

    function completeOrder() {
      state.coins += 25;
      state.power.hammer += 1;
      state.power.shuffle += 1;
      toast('Заказ выполнен! +25 монет, +бонусы');
      sound('win');
      newOrder();
    }

    function showCombo(text, cell, color) {
      const rect = els.game.getBoundingClientRect();
      const boardRect = els.board.getBoundingClientRect();
      const el = document.createElement('div');
      el.className = 'combo-float';
      el.textContent = text;
      el.style.left = `${boardRect.left - rect.left + cell.x - 22}px`;
      el.style.top = `${boardRect.top - rect.top + cell.y - 30}px`;
      el.style.color = color;
      els.game.appendChild(el);
      setTimeout(() => el.remove(), 820);
    }

    function popParticles(cells, color) {
      const gameRect = els.game.getBoundingClientRect();
      const boardRect = els.board.getBoundingClientRect();
      cells.forEach(cell => {
        for (let i = 0; i < 7; i++) {
          const p = document.createElement('div');
          p.className = 'particle';
          p.style.left = `${boardRect.left - gameRect.left + cell.x}px`;
          p.style.top = `${boardRect.top - gameRect.top + cell.y}px`;
          p.style.setProperty('--p', color);
          p.style.setProperty('--dx', `${-45 + Math.random() * 90}px`);
          p.style.setProperty('--dy', `${-55 + Math.random() * 80}px`);
          els.game.appendChild(p);
          setTimeout(() => p.remove(), 700);
        }
      });
    }

    function checkGameOver() {
      if (state.cells.some(c => !c.stack.length)) return;
      state.best = Math.max(state.best, state.score);
      renderHud();
      setTimeout(() => {
        els.gameoverText.textContent = `Счёт: ${state.score.toLocaleString('ru-RU')}. Лучший: ${state.best.toLocaleString('ru-RU')}.`;
        els.overlay.classList.add('show');
        try { state.ya?.adv?.showFullscreenAdv?.({ callbacks: {} }); } catch (e) {}
      }, 400);
    }

    function setTool(tool) {
      state.selectedPiece = null;
      state.activeTool = state.activeTool === tool ? null : tool;
      sound('tap');
      updateToolButtons();
      renderTray();
      renderBoard();
      if (state.activeTool) toast(tool === 'hammer' ? 'Выбери стек, который убрать' : 'Выбери центр взрыва');
    }

    function updateToolButtons() {
      els.hammerBtn.classList.toggle('active', state.activeTool === 'hammer');
      els.bombBtn.classList.toggle('active', state.activeTool === 'bomb');
      els.shuffleBtn.classList.toggle('active', state.activeTool === 'shuffle');
    }

    function useToolOnCell(cell) {
      if (state.activeTool === 'hammer') {
        if (!state.power.hammer) return toast('Молотков больше нет');
        if (!cell.stack.length) return toast('Тут пусто');
        state.power.hammer--;
        cell.stack = [];
        state.activeTool = null;
        sound('pop');
        showCombo('CLEAR', cell, '#ffffff');
      }
      if (state.activeTool === 'bomb') {
        if (!state.power.bomb) return toast('Бомб больше нет');
        state.power.bomb--;
        const targets = [cell, ...cell.neigh.map(id => state.cells[id])];
        targets.forEach(c => c.stack = []);
        state.activeTool = null;
        sound('win');
        showCombo('BOOM!', cell, '#ffd166');
        popParticles(targets, '#ffd166');
      }
      updateToolButtons();
      renderHud();
      renderBoard();
      checkGameOver();
    }

    function shufflePieces() {
      if (!state.power.shuffle) return toast('Рероллов больше нет');
      state.power.shuffle--;
      state.pieces = [newPiece(), newPiece(), newPiece()];
      state.activeTool = null;
      state.selectedPiece = null;
      sound('place');
      renderHud();
      renderTray();
      updateToolButtons();
    }

    function adReward() {
      const reward = () => {
        state.coins += 30;
        state.power.hammer += 1;
        state.power.bomb += 1;
        state.power.shuffle += 1;
        toast('Бонус получен: +30 монет и усиления');
        renderHud();
      };
      try {
        if (state.ya?.adv?.showRewardedVideo) {
          state.ya.adv.showRewardedVideo({ callbacks: { onRewarded: reward, onError: reward } });
        } else reward();
      } catch (e) { reward(); }
    }

    function startDrag(e, index) {
      if (e.button !== undefined && e.button !== 0) return;
      const piece = state.pieces[index];
      if (!piece) return;
      state.selectedPiece = index;
      renderTray();
      const ghost = document.createElement('div');
      ghost.className = 'drag-ghost';
      ghost.appendChild(createStack(piece));
      document.body.appendChild(ghost);
      state.dragging = { index, ghost, target: null };
      moveDrag(e.clientX, e.clientY);
      sound('tap');
      window.addEventListener('pointermove', onDragMove);
      window.addEventListener('pointerup', endDrag, { once: true });
    }

    function onDragMove(e) { if (state.dragging) moveDrag(e.clientX, e.clientY); }

    function moveDrag(x, y) {
      const d = state.dragging;
      if (!d) return;
      d.ghost.style.left = `${x}px`;
      d.ghost.style.top = `${y}px`;
      const old = d.target;
      const cell = findCellAt(x, y);
      d.target = cell && !cell.stack.length ? cell : null;
      if (old !== d.target) {
        state.cells.forEach(c => c.el.classList.toggle('target', d.target && c.id === d.target.id));
      }
    }

    function endDrag() {
      const d = state.dragging;
      if (!d) return;
      d.ghost.remove();
      state.cells.forEach(c => c.el.classList.remove('target'));
      state.dragging = null;
      window.removeEventListener('pointermove', onDragMove);
      if (d.target) placePiece(d.index, d.target);
      else {
        sound('bad');
        renderTray();
      }
    }

    function findCellAt(x, y) {
      const rect = els.board.getBoundingClientRect();
      let best = null;
      let bestD = Infinity;
      state.cells.forEach(cell => {
        const cx = rect.left + cell.x;
        const cy = rect.top + cell.y;
        const d = Math.hypot(x - cx, y - cy);
        if (d < bestD) { bestD = d; best = cell; }
      });
      return bestD < 54 ? best : null;
    }

    let toastTimer = 0;
    function toast(text) {
      els.toast.textContent = text;
      els.toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => els.toast.classList.remove('show'), 1450);
    }

    function resetGame() {
      state.score = 0;
      state.combo = 1;
      state.selectedPiece = null;
      state.activeTool = null;
      state.power = { hammer: 2, bomb: 1, shuffle: 2 };
      state.cells.forEach(c => c.stack = []);
      const starters = [4, 8, 10].filter(i => state.cells[i]);
      starters.forEach((id, i) => { state.cells[id].stack = [COLORS[i].id, COLORS[i].id, COLORS[(i + 1) % COLORS.length].id]; });
      state.pieces = [newPiece(), newPiece(), newPiece()];
      newOrder();
      els.overlay.classList.remove('show');
      updateToolButtons();
      renderHud();
      renderBoard();
      renderTray();
    }

    els.hammerBtn.addEventListener('click', () => setTool('hammer'));
    els.bombBtn.addEventListener('click', () => setTool('bomb'));
    els.shuffleBtn.addEventListener('click', shufflePieces);
    els.adBtn.addEventListener('click', adReward);
    els.restartBtn.addEventListener('click', resetGame);
    document.addEventListener('pointerdown', () => { try { makeAudio()?.resume?.(); } catch (e) {} }, { once: true });

    buildBoard();
    initYandex();
    resetGame();
  })();
  </script>
</body>
